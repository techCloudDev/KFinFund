name: KFinFund CI/CD

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      frontend:          ${{ steps.filter.outputs.frontend }}
      user-service:      ${{ steps.filter.outputs.user-service }}
      kyc-service:       ${{ steps.filter.outputs.kyc-service }}
      transaction-service: ${{ steps.filter.outputs.transaction-service }}
      sip-service:       ${{ steps.filter.outputs.sip-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect which services changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            user-service:
              - 'user-service/**'
            kyc-service:
              - 'kyc-service/**'
            transaction-service:
              - 'transaction-service/**'
            sip-service:
              - 'sip-service/**'
            notification-service:
              - 'notification-service/**'

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name kfinfund-cluster

      # ── Frontend ──────────────────────────────────────────────────
      - name: Build & Deploy frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          docker build \
            --build-arg VITE_USER_API=${{ secrets.VITE_USER_API }} \
            --build-arg VITE_TRANSACTION_API=${{ secrets.VITE_TRANSACTION_API }} \
            --build-arg VITE_SIP_API=${{ secrets.VITE_SIP_API }} \
            --build-arg VITE_KYC_API=${{ secrets.VITE_KYC_API }} \
            --build-arg VITE_NOTIFICATION_API=${{ secrets.VITE_NOTIFICATION_API }} \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-frontend:latest \
            ./frontend
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-frontend:latest
          kubectl rollout restart deployment frontend
          kubectl rollout status deployment frontend --timeout=120s

      # ── User Service ──────────────────────────────────────────────
      - name: Build & Deploy user-service
        if: needs.detect-changes.outputs.user-service == 'true'
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-user-service:latest \
            ./user-service
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-user-service:latest
          kubectl rollout restart deployment user-service
          kubectl rollout status deployment user-service --timeout=120s

      # ── KYC Service ───────────────────────────────────────────────
      - name: Build & Deploy kyc-service
        if: needs.detect-changes.outputs.kyc-service == 'true'
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-kyc-service:latest \
            ./kyc-service
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-kyc-service:latest
          kubectl rollout restart deployment kyc-service
          kubectl rollout status deployment kyc-service --timeout=120s

      # ── Transaction Service ───────────────────────────────────────
      - name: Build & Deploy transaction-service
        if: needs.detect-changes.outputs.transaction-service == 'true'
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-transaction-service:latest \
            ./transaction-service
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-transaction-service:latest
          kubectl rollout restart deployment transaction-service
          kubectl rollout status deployment transaction-service --timeout=120s

      # ── SIP Service ───────────────────────────────────────────────
      - name: Build & Deploy sip-service
        if: needs.detect-changes.outputs.sip-service == 'true'
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-sip-service:latest \
            ./sip-service
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-sip-service:latest
          kubectl rollout restart deployment sip-service
          kubectl rollout status deployment sip-service --timeout=120s

      # ── Notification Service ──────────────────────────────────────
      - name: Build & Deploy notification-service
        if: needs.detect-changes.outputs.notification-service == 'true'
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/kfinfund-notification-service:latest \
            ./notification-service
          docker push ${{ secrets.ECR_REGISTRY }}/kfinfund-notification-service:latest
          kubectl rollout restart deployment notification-service
          kubectl rollout status deployment notification-service --timeout=120s

      - name: Summary
        run: |
          echo "✅ CI/CD pipeline completed"
          echo "Changed services deployed:"
          echo "  Frontend:             ${{ needs.detect-changes.outputs.frontend }}"
          echo "  User Service:         ${{ needs.detect-changes.outputs.user-service }}"
          echo "  KYC Service:          ${{ needs.detect-changes.outputs.kyc-service }}"
          echo "  Transaction Service:  ${{ needs.detect-changes.outputs.transaction-service }}"
          echo "  SIP Service:          ${{ needs.detect-changes.outputs.sip-service }}"
          echo "  Notification Service: ${{ needs.detect-changes.outputs.notification-service }}"
          kubectl get pods