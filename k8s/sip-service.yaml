apiVersion: apps/v1
kind: Deployment
metadata:
  name: sip-service
  labels:
    app: sip-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sip-service
  template:
    metadata:
      labels:
        app: sip-service
    spec:
      containers:
        - name: sip-service
          image: sip-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "kfinfund_sips"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres123"
            - name: JWT_SECRET
              value: "kfinfund_secret_key_2026"
            - name: PORT
              value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: sip-service
spec:
  selector:
    app: sip-service
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004
  type: ClusterIP