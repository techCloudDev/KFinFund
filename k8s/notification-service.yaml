apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: 325779841724.dkr.ecr.ap-south-1.amazonaws.com/kfinfund-notification-service:latest
          ports:
            - containerPort: 3005
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/kfinfund_notifications"
            - name: RESEND_API_KEY
              value: re_eUi8G84L_JQm9kcJnpGXu5yHDyyi9tByn
            - name: JWT_SECRET
              value: "kfinfund_secret_key_2026"
            - name: PORT
              value: "3005"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
  type: ClusterIP