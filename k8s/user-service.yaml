apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 325779841724.dkr.ecr.ap-south-1.amazonaws.com/kfinfund-user-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "kfinfund_users"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres123"
            - name: JWT_SECRET
              value: "kfinfund_secret_key_2026"
            - name: PORT
              value: "3001"
            - name: RESEND_API_KEY
              value: re_eUi8G84L_JQm9kcJnpGXu5yHDyyi9tByn
            - name: FRONTEND_URL
              value: "http://a8bd375800d1f42bd860ba47a5513716-1143135270.ap-south-1.elb.amazonaws.com"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP