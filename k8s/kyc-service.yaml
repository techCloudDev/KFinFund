apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyc-service
  labels:
    app: kyc-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kyc-service
  template:
    metadata:
      labels:
        app: kyc-service
    spec:
      containers:
        - name: kyc-service
          image: kyc-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/kfinfund_kyc"
            - name: JWT_SECRET
              value: "kfinfund_secret_key_2026"
            - name: PORT
              value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: kyc-service
spec:
  selector:
    app: kyc-service
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP